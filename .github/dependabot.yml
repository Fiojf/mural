version: 2
updates:
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    groups:
      objc2:
        patterns:
          - "objc2*"
      tauri:
        patterns:
          - "tauri*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      tauri-api:
        patterns:
          - "@tauri-apps/*"
      solid:
        patterns:
          - "solid-js"
          - "vite-plugin-solid"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
