name: Bug report
description: Something is broken in Mural.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Brief description of the bug.
      placeholder: When I press the hotkey...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Mural
        2. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Mural version
      placeholder: 0.1.0-beta.1
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: 14.5 (Sonoma)
    validations:
      required: true

  - type: dropdown
    id: chip
    attributes:
      label: Chip
      options:
        - Apple Silicon (arm64)
        - Intel (x86_64)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Run with `RUST_LOG=mural=debug npm run tauri dev` and paste relevant output.
      render: text
